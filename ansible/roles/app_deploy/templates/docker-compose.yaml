version: "3.8"

services:
  frontend:
    image: {{ frontend_image }}
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8080
    depends_on:
      - backend

  backend:
    image: {{ backend_image }}
    container_name: backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - /opt/app/.env
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    command: ["nginx", "-g", "daemon off;"]

networks:
  default:
    driver: bridge
