version: "{{ compose_version }}"

services:
  frontend:
    image: "{{ frontend_image }}"
    container_name: "{{ frontend_container_name }}"
    restart: always
    ports:
      - "{{ frontend_host_port }}:{{ frontend_container_port }}"
    environment:
      API_URL: "{{ api_url }}"
    depends_on:
      - backend
    networks:
      - "{{ app_network }}"

  backend:
    image: "{{ backend_image }}"
    container_name: "{{ backend_container_name }}"
    restart: always
    ports:
      - "{{ backend_host_port }}:{{ backend_container_port }}"
    env_file:
      - "{{ backend_env_file }}"
    volumes:
      - "{{ nginx_conf_path }}:/etc/nginx/nginx.conf:ro"
    command: ["nginx", "-g", "daemon off;"]
    networks:
      - "{{ app_network }}"

networks:
  "{{ app_network }}":
    driver: bridge
``
